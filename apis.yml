apis:
  - aid: fullstory:fullstory-server-api
    name: FullStory Server API
    description: >-
      FullStory Server API v2 ingests user identification, traits, custom events, and supports batch operations.
      Authentication uses an API key prefixed with the data center ID (e.g. na1.<token>).
    image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    humanURL: https://developer.fullstory.com/server/v2/getting-started/
    baseURL: https://api.fullstory.com
    tags:
      - Behavioral Analytics
      - Session Replay
      - REST
    properties:
      - type: Documentation
        url: https://developer.fullstory.com/server/v2/getting-started/
      - type: Developers
        url: https://developer.fullstory.com/
      - type: OpenAPI
        url: openapi/fullstory-server-api-openapi.yml
  - aid: fullstory:fullstory-sessions-api
    name: FullStory Sessions API
    description: FullStory Sessions API for retrieving session metadata, replay URLs, and session-level details.
