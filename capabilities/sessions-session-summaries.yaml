naftiko: 1.0.0-alpha2
info:
  label: FullStory Sessions API — Session Summaries
  description: 'FullStory Sessions API — Session Summaries. 1 operations. Lead operation: Generate AI session summary. Self-contained
    Naftiko capability covering one Fullstory business surface.'
  tags:
  - Fullstory
  - Session Summaries
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    FULLSTORY_API_KEY: FULLSTORY_API_KEY
capability:
  consumes:
  - type: http
    namespace: sessions-session-summaries
    baseUri: https://api.fullstory.com
    description: FullStory Sessions API — Session Summaries business capability. Self-contained, no shared references.
    resources:
    - name: v2-sessions-sessionId-summary
      path: /v2/sessions/{sessionId}/summary
      operations:
      - name: generatesessionsummary
        method: GET
        description: Generate AI session summary
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: basic
      username: '{{env.FULLSTORY_USER}}'
      password: '{{env.FULLSTORY_PASS}}'
  exposes:
  - type: rest
    namespace: sessions-session-summaries-rest
    port: 8080
    description: REST adapter for FullStory Sessions API — Session Summaries. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/v2/sessions/{sessionid}/summary
      name: v2-sessions-sessionid-summary
      description: REST surface for v2-sessions-sessionId-summary.
      operations:
      - method: GET
        name: generatesessionsummary
        description: Generate AI session summary
        call: sessions-session-summaries.generatesessionsummary
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: sessions-session-summaries-mcp
    port: 9090
    transport: http
    description: MCP adapter for FullStory Sessions API — Session Summaries. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: generate-ai-session-summary
      description: Generate AI session summary
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: sessions-session-summaries.generatesessionsummary
      outputParameters:
      - type: object
        mapping: $.
