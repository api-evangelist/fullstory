naftiko: 1.0.0-alpha2
info:
  label: FullStory Webhooks API — Endpoints
  description: 'FullStory Webhooks API — Endpoints. 5 operations. Lead operation: Create a webhook endpoint. Self-contained
    Naftiko capability covering one Fullstory business surface.'
  tags:
  - Fullstory
  - Endpoints
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    FULLSTORY_API_KEY: FULLSTORY_API_KEY
capability:
  consumes:
  - type: http
    namespace: webhooks-endpoints
    baseUri: https://api.fullstory.com
    description: FullStory Webhooks API — Endpoints business capability. Self-contained, no shared references.
    resources:
    - name: webhooks-v1-endpoints
      path: /webhooks/v1/endpoints
      operations:
      - name: createendpoint
        method: POST
        description: Create a webhook endpoint
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: listendpoints
        method: GET
        description: List webhook endpoints
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: webhooks-v1-endpoints-endpointId
      path: /webhooks/v1/endpoints/{endpointId}
      operations:
      - name: getendpoint
        method: GET
        description: Get a webhook endpoint
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: updateendpoint
        method: PUT
        description: Update a webhook endpoint
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: deleteendpoint
        method: DELETE
        description: Delete a webhook endpoint
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: basic
      username: '{{env.FULLSTORY_USER}}'
      password: '{{env.FULLSTORY_PASS}}'
  exposes:
  - type: rest
    namespace: webhooks-endpoints-rest
    port: 8080
    description: REST adapter for FullStory Webhooks API — Endpoints. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/webhooks/v1/endpoints
      name: webhooks-v1-endpoints
      description: REST surface for webhooks-v1-endpoints.
      operations:
      - method: POST
        name: createendpoint
        description: Create a webhook endpoint
        call: webhooks-endpoints.createendpoint
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: GET
        name: listendpoints
        description: List webhook endpoints
        call: webhooks-endpoints.listendpoints
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/webhooks/v1/endpoints/{endpointid}
      name: webhooks-v1-endpoints-endpointid
      description: REST surface for webhooks-v1-endpoints-endpointId.
      operations:
      - method: GET
        name: getendpoint
        description: Get a webhook endpoint
        call: webhooks-endpoints.getendpoint
        outputParameters:
        - type: object
          mapping: $.
      - method: PUT
        name: updateendpoint
        description: Update a webhook endpoint
        call: webhooks-endpoints.updateendpoint
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: deleteendpoint
        description: Delete a webhook endpoint
        call: webhooks-endpoints.deleteendpoint
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: webhooks-endpoints-mcp
    port: 9090
    transport: http
    description: MCP adapter for FullStory Webhooks API — Endpoints. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: create-webhook-endpoint
      description: Create a webhook endpoint
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: webhooks-endpoints.createendpoint
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: list-webhook-endpoints
      description: List webhook endpoints
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: webhooks-endpoints.listendpoints
      outputParameters:
      - type: object
        mapping: $.
    - name: get-webhook-endpoint
      description: Get a webhook endpoint
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: webhooks-endpoints.getendpoint
      outputParameters:
      - type: object
        mapping: $.
    - name: update-webhook-endpoint
      description: Update a webhook endpoint
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: webhooks-endpoints.updateendpoint
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: delete-webhook-endpoint
      description: Delete a webhook endpoint
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: webhooks-endpoints.deleteendpoint
      outputParameters:
      - type: object
        mapping: $.
