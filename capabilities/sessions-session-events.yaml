naftiko: 1.0.0-alpha2
info:
  label: FullStory Sessions API — Session Events
  description: 'FullStory Sessions API — Session Events. 1 operations. Lead operation: Get session events. Self-contained
    Naftiko capability covering one Fullstory business surface.'
  tags:
  - Fullstory
  - Session Events
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    FULLSTORY_API_KEY: FULLSTORY_API_KEY
capability:
  consumes:
  - type: http
    namespace: sessions-session-events
    baseUri: https://api.fullstory.com
    description: FullStory Sessions API — Session Events business capability. Self-contained, no shared references.
    resources:
    - name: v2-sessions-sessionId-events
      path: /v2/sessions/{sessionId}/events
      operations:
      - name: getsessionevents
        method: GET
        description: Get session events
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: basic
      username: '{{env.FULLSTORY_USER}}'
      password: '{{env.FULLSTORY_PASS}}'
  exposes:
  - type: rest
    namespace: sessions-session-events-rest
    port: 8080
    description: REST adapter for FullStory Sessions API — Session Events. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/v2/sessions/{sessionid}/events
      name: v2-sessions-sessionid-events
      description: REST surface for v2-sessions-sessionId-events.
      operations:
      - method: GET
        name: getsessionevents
        description: Get session events
        call: sessions-session-events.getsessionevents
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: sessions-session-events-mcp
    port: 9090
    transport: http
    description: MCP adapter for FullStory Sessions API — Session Events. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: get-session-events
      description: Get session events
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: sessions-session-events.getsessionevents
      outputParameters:
      - type: object
        mapping: $.
