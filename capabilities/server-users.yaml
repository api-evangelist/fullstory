naftiko: 1.0.0-alpha2
info:
  label: FullStory Server API — Users
  description: 'FullStory Server API — Users. 3 operations. Lead operation: Create or update a user. Self-contained Naftiko
    capability covering one Fullstory business surface.'
  tags:
  - Fullstory
  - Users
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    FULLSTORY_API_KEY: FULLSTORY_API_KEY
capability:
  consumes:
  - type: http
    namespace: server-users
    baseUri: https://api.fullstory.com
    description: FullStory Server API — Users business capability. Self-contained, no shared references.
    resources:
    - name: v2-users
      path: /v2/users
      operations:
      - name: createuser
        method: POST
        description: Create or update a user
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: deleteuser
        method: DELETE
        description: Delete a user
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: v2-users-id
      path: /v2/users/{id}
      operations:
      - name: getuser
        method: GET
        description: Retrieve a user
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: basic
      username: '{{env.FULLSTORY_USER}}'
      password: '{{env.FULLSTORY_PASS}}'
  exposes:
  - type: rest
    namespace: server-users-rest
    port: 8080
    description: REST adapter for FullStory Server API — Users. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/v2/users
      name: v2-users
      description: REST surface for v2-users.
      operations:
      - method: POST
        name: createuser
        description: Create or update a user
        call: server-users.createuser
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: deleteuser
        description: Delete a user
        call: server-users.deleteuser
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/v2/users/{id}
      name: v2-users-id
      description: REST surface for v2-users-id.
      operations:
      - method: GET
        name: getuser
        description: Retrieve a user
        call: server-users.getuser
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: server-users-mcp
    port: 9090
    transport: http
    description: MCP adapter for FullStory Server API — Users. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: create-update-user
      description: Create or update a user
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: server-users.createuser
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: delete-user
      description: Delete a user
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: server-users.deleteuser
      outputParameters:
      - type: object
        mapping: $.
    - name: retrieve-user
      description: Retrieve a user
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: server-users.getuser
      outputParameters:
      - type: object
        mapping: $.
